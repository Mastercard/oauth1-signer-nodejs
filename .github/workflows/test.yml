name: Build & Test
'on':
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  schedule:
    - cron: 0 16 * * *
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          - 18.x
          - 20.x
          - 22.x
          - 24.x
    steps:
      - uses: actions/checkout@v7.0.0
      - name: 'Use Node.js ${{ matrix.node-version }}'
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '${{ matrix.node-version }}'
      - run: npm ci
      - run: npm run build --if-present
      - run: npm test
